<section class="page-card p-4">
    <div class="page-header">
        <div>
            <h2 class="h4 mb-1">Leilões</h2>
        </div>
    </div>

    <div class="alert alert-danger" ng-if="vm.error">{{ vm.error }}</div>
    <div class="text-muted" ng-if="vm.loading">Carregando leilões...</div>

    <div class="table-responsive" ng-if="!vm.loading && vm.leiloes.length">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Vendedor</th>
                    <th>Início previsto</th>
                    <th class="text-end">Total do leilão</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="leilao in vm.leiloes track by leilao.id">
                    <td>{{ leilao.razaoSocialVendedor }}</td>
                    <td>{{ leilao.inicioPrevisto | date:'dd/MM/yyyy HH:mm' }}</td>
                    <td class="text-end">{{ leilao.total | currency:'R$ ' }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" ng-if="!vm.loading && !vm.leiloes.length">Nenhum leilão encontrado.</div>
</section>
