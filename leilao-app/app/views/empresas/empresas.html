<section class="page-card p-4">
    <div class="page-header">
        <div>
            <h2 class="h4 mb-1">Empresas</h2>
        </div>
        <button class="btn btn-primary" ng-click="vm.goToCreate()">Nova empresa</button>
    </div>

    <div class="alert alert-danger" ng-if="vm.error">{{ vm.error }}</div>
    <div class="text-muted" ng-if="vm.loading">Carregando empresas...</div>

    <div class="table-responsive" ng-if="!vm.loading && vm.empresas.length">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>CNPJ</th>
                    <th>Razão social</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th class="text-end">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="empresa in vm.empresas track by empresa.id">
                    <td>{{ empresa.cnpj }}</td>
                    <td>{{ empresa.razaoSocial }}</td>
                    <td>{{ empresa.telefone || '-' }}</td>
                    <td>{{ empresa.email || '-' }}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" ng-click="vm.goToEdit(empresa.id)">Editar</button>
                        <button class="btn btn-sm btn-outline-danger" ng-click="vm.remove(empresa)">Excluir</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" ng-if="!vm.loading && !vm.empresas.length">Nenhuma empresa encontrada.</div>
</section>
