<section class="page-card p-4">
    <div class="page-header">
        <div>
            <h2 class="h4 mb-1">{{ vm.isEdit ? 'Editar empresa' : 'Nova empresa' }}</h2>
            <p class="text-muted mb-0">Formulario com validacoes de obrigatoriedade, formato e tamanho.</p>
        </div>
    </div>

    <div class="alert alert-danger" ng-if="vm.error">{{ vm.error }}</div>
    <div class="text-muted" ng-if="vm.loading">Carregando empresa...</div>

    <form name="empresaForm" novalidate ng-submit="vm.save(empresaForm)" ng-if="!vm.loading">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Razao social</label>
                <input type="text" name="razaoSocial" class="form-control" ng-model="vm.form.razaoSocial" maxlength="64" required>
                <div class="field-error" ng-if="empresaForm.$submitted && empresaForm.razaoSocial.$error.required">Razao social obrigatoria.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">CNPJ</label>
                <input type="text" name="cnpj" class="form-control" ng-model="vm.form.cnpj" ng-pattern="/^[0-9./-]+$/" maxlength="32" placeholder="00.000.000/0000-00" required>
                <div class="field-error" ng-if="empresaForm.$submitted && empresaForm.cnpj.$error.required">CNPJ obrigatorio.</div>
                <div class="field-error" ng-if="empresaForm.cnpj.$error.pattern">Use apenas numeros e os separadores ./-.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" class="form-control" ng-model="vm.form.telefone" maxlength="32" placeholder="(00) 0000-0000">
            </div>

            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" ng-model="vm.form.email" maxlength="254">
                <div class="field-error" ng-if="empresaForm.email.$error.email">Email invalido.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Site</label>
                <input type="url" name="site" class="form-control" ng-model="vm.form.site" maxlength="254" placeholder="https://empresa.com">
                <div class="field-error" ng-if="empresaForm.site.$error.url">URL invalida.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">CEP</label>
                <input type="text" name="cep" class="form-control" ng-model="vm.form.cep" maxlength="16">
            </div>

            <div class="col-md-4">
                <label class="form-label">Logradouro</label>
                <input type="text" name="logradouro" class="form-control" ng-model="vm.form.logradouro" maxlength="64">
            </div>

            <div class="col-md-4">
                <label class="form-label">Numero</label>
                <input type="text" name="numero" class="form-control" ng-model="vm.form.numero" maxlength="10">
            </div>

            <div class="col-md-4">
                <label class="form-label">Complemento</label>
                <input type="text" name="complemento" class="form-control" ng-model="vm.form.complemento" maxlength="64">
            </div>

            <div class="col-md-4">
                <label class="form-label">Municipio</label>
                <input type="text" name="municipio" class="form-control" ng-model="vm.form.municipio" maxlength="64">
            </div>

            <div class="col-md-4">
                <label class="form-label">Bairro</label>
                <input type="text" name="bairro" class="form-control" ng-model="vm.form.bairro" maxlength="64">
            </div>

            <div class="col-md-4">
                <label class="form-label">Usuario</label>
                <input type="text" name="usuario" class="form-control" ng-model="vm.form.usuario" maxlength="20" required>
                <div class="field-error" ng-if="empresaForm.$submitted && empresaForm.usuario.$error.required">Usuario obrigatorio.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" ng-model="vm.form.senha" maxlength="128">
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <button class="btn btn-outline-secondary" type="button" ng-click="vm.cancel()">Cancelar</button>
            <button class="btn btn-primary" type="submit">Salvar</button>
        </div>
    </form>
</section>
